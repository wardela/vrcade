<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Create Tenant</title>
</head>
<body>
  <h2>Create Tenant</h2>

  <form id="form">
    <input id="name" placeholder="Tenant Name" /><br /><br />
    <input id="code" placeholder="Tenant Code" /><br /><br />
    <input id="user" placeholder="Owner Username" /><br /><br />
    <input id="pass" type="password" placeholder="Owner Password" /><br /><br />
    <button type="submit">Create</button>
  </form>

  <pre id="out"></pre>

<script>
  const form = document.getElementById("form");
  const out = document.getElementById("out");

  const nameInput = document.getElementById("name");
  const codeInput = document.getElementById("code");
  const userInput = document.getElementById("user");
  const passInput = document.getElementById("pass");

  form.onsubmit = async (e) => {
    e.preventDefault();

    if (
      !nameInput.value ||
      !codeInput.value ||
      !userInput.value ||
      !passInput.value
    ) {
      out.textContent = "All fields are required";
      return;
    }

    if (!confirm("Create tenant and schema?")) return;

    const res = await fetch("/tenants/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tenant_name: nameInput.value,
        tenant_code: codeInput.value,
        owner_username: userInput.value,
        owner_password: passInput.value,
      }),
    });

    out.textContent = await res.text();
  };
</script>

</body>
</html>
